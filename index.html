<!DOCTYPE html>
<html>
<head>
    <title>My Music App</title>
    <style>
        .app{
  display:flex;
  height:100vh;
  background:#121212;
  color:white;
  font-family:Arial;
}

.sidebar{
  width:220px;
  background:#000;
  padding:20px;
}

.sidebar ul{
  list-style:none;
  padding:0;
}

.sidebar li{
  margin:10px 0;
  cursor:pointer;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
}

.album{
  background:#181818;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.album img{
  width:100%;
  border-radius:10px;
}

.album:hover{
  background:#282828;
}

.player-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:80px;
  background:#181818;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
}

.player-left{
  display:flex;
  align-items:center;
}

.player-left img{
  width:60px;
  height:60px;
  border-radius:8px;
  margin-right:10px;
}

.player-center button{
  margin:0 10px;
  background:#1db954;
  border:none;
  padding:10px 15px;
  border-radius:50%;
  cursor:pointer;
}

.player-right input{
  width:100px;
}

body{
    margin:0;
    background:#121212;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

/* player card */
.container{
    max-width:400px;
    margin:auto;
    padding:20px;
    text-align:center;
}

/* album cover */
#cover{
    width:100%;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
}

/* title */
#title{
    margin:15px 0;
    font-size:20px;
    font-weight:bold;
}

/* buttons */
button{
    background:#1db954;
    border:none;
    color:white;
    padding:10px 15px;
    margin:5px;
    border-radius:25px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#1ed760;
}

/* search */
#search{
    width:100%;
    padding:12px;
    border-radius:20px;
    border:none;
    outline:none;
    margin-top:10px;
}

/* playlist items */
#playlist div{
    background:#181818;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
}

#playlist div:hover{
    background:#282828;
}

/* progress */
#progress{
    width:100%;
}

/* mobile spacing */
@media(max-width:500px){
    .container{padding:15px;}
}
.album{
  position:relative;
  background:#181818;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.play-hover{
  position:absolute;
  bottom:60px;
  right:20px;
  background:#1db954;
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  color:black;
  font-size:18px;
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
  cursor:pointer;
}

.album:hover .play-hover{
  opacity:1;
  transform:translateY(0);
}

.play-hover:hover{
  transform:scale(1.1);
}
.control-buttons{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-top:20px;
}

.control{
  background:#1db954;
  border:none;
  color:white;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.control.small{
  width:45px;
  height:45px;
  border-radius:50%;
  font-size:16px;
}

.control.big{
  width:65px;
  height:65px;
  border-radius:50%;
  font-size:22px;
}

.control:hover{
  transform:scale(1.1);
  background:#1ed760;
}

</style>

    <br>
<button onclick="toggleLike()" id="likeBtn">🤍 Like</button>

<h3>💚 Favourites</h3>
<div id="favList"></div>


<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

#cover{
    width:220px;
    height:220px;
    border-radius:15px;
    margin-top:20px;
    object-fit:cover;
    box-shadow:0 0 20px #000;
}

.song{
    background:#222;
    padding:12px;
    margin:10px auto;
    width:260px;
    border-radius:10px;
    cursor:pointer;
}

.song:hover{
    background:#444;
}

.active{
    background:#1db954;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🎵 MySpotify</h2>
    <ul>
      <li>🏠 Home</li>
      <li>🔍 Search</li>
      <li>📚 Library</li>
    </ul>

    <hr>

    <h4>Your Playlists</h4>
    <ul id="userPlaylists">
      <li>❤️ Liked Songs</li>
      <li>🎧 Tamil Hits</li>
    </ul>
  </div>


  <!-- MAIN CONTENT -->
  <div class="main">

    <h1>Good Evening</h1>

    <div class="album" onclick="playSong(0)">
  <img src="cover1.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 1</p>
</div>

<div class="album" onclick="playSong(1)">
  <img src="cover2.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 2</p>
</div>

<div class="album" onclick="playSong(2)">
  <img src="cover3.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 3</p>
</div>

<div class="album" onclick="playSong(3)">
  <img src="cover4.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 4</p>
</div>

<div class="album" onclick="playSong(4)">
  <img src="cover5.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 5</p>
</div>

<div class="album" onclick="playSong(5)">
  <img src="cover6.jpg">
  <button class="play-overlay">▶</button>
  <p>Song 6</p>
</div>
<div class="album">
  <img src="cover6.jpg"><button onclick="togglePlay()" id="playBtn6">▶</button>
  <button class="play-overlay" onclick="playSong(6)">
  <p>Song 6</p>
</div>
    </div>

  </div>

</div>


<!-- BOTTOM PLAYER -->

</div>
<audio id="player"></audio>

</body>
<button onclick="togglePlay()" id="playBtn" class="control big">
  ▶
</button>

<button onclick="toggleShuffle()" id="shuffleBtn">🔀 Shuffle Off</button>

<button onclick="toggleRepeat()" id="repeatBtn">🔁 Repeat Off</button>


 
<script>

let player = document.getElementById("player");
let title = document.getElementById("title");
let cover = document.getElementById("cover");
let playlist = document.getElementById("playlist");
let search = document.getElementById("search");


let songs = [
 {name:"Song 1", file:"song1.mp3", cover:"cover1.jpg"},
 {name:"Song 2", file:"song2.mp3", cover:"cover2.jpg"},
 {name:"Song 3", file:"song3.mp3", cover:"cover3.jpg"},
 {name:"Song 4", file:"song4.mp3", cover:"cover4.jpg"},
 {name:"Song 5", file:"song5.mp3", cover:"cover5.jpg"},
 {name:"Song 6", file:"song6.mp3", cover:"cover6.jpg"}
];


let current = 0;








// NEXT
function nextSong(){

    if(shuffle){
        current = Math.floor(Math.random() * songs.length);
    }else{
        current++;
        if(current >= songs.length) current = 0;
    }

    playSong(current);
}
// PREVIOUS
function prevSong(){
    current--;
    if(current < 0) current = songs.length - 1;
    playSong(current);
}

// AUTO NEXT
let isPlaying = false;
let isShuffle = false;
let isRepeat = false;

/* PLAY / PAUSE */
function togglePlay(){
  if(player.paused){
    player.play();
    document.getElementById("playBtn").innerText="⏸ Pause";
  }else{
    player.pause();
    document.getElementById("playBtn").innerText="▶ Play";
  }
}

/* SHUFFLE */
function toggleShuffle(){
  isShuffle = !isShuffle;
  document.getElementById("shuffleBtn").innerText =
    isShuffle ? "🔀 Shuffle On" : "🔀 Shuffle Off";
}

/* REPEAT */
function toggleRepeat(){
  isRepeat = !isRepeat;
  document.getElementById("repeatBtn").innerText =
    isRepeat ? "🔁 Repeat On" : "🔁 Repeat Off";
}



function prevSong(){

  if(isShuffle){
    let r = Math.floor(Math.random()*songs.length);
    playSong(r);
    return;
  }

  current--;
  if(current < 0) current = songs.length-1;
  playSong(current);
}
player.onended = function(){
  nextSong();
};




// duration load aana apram
player.onloadedmetadata = function(){
    progress.max = Math.floor(player.duration);
    updateTime();
};

// song odumbothu bar move
player.ontimeupdate = function(){
    progress.value = Math.floor(player.currentTime);
    updateTime();
};

// drag pannina seek
progress.oninput = function(){
    player.currentTime = progress.value;
};

// time format
function updateTime(){
    let cur = format(player.currentTime);
    let dur = format(player.duration);
    time.innerText = cur + " / " + dur;
}

function format(sec){
    if(!sec) return "0:00";
    let m = Math.floor(sec/60);
    let s = Math.floor(sec%60);
    if(s<10) s="0"+s;
    return m+":"+s;
}
let playBtn = document.getElementById("playBtn");

playBtn.onclick = function(){
    if(player.paused){
        player.play();
        playBtn.innerText = "⏸ Pause";
    }else{
        player.pause();
        playBtn.innerText = "▶ Play";
    }
};

// song play aana button change
player.onplay = () => playBtn.innerText="⏸ Pause";
player.onpause = () => playBtn.innerText="▶ Play";
let shuffle = false;
let shuffleBtn = document.getElementById("shuffleBtn");

shuffleBtn.onclick = function(){
    shuffle = !shuffle;

    if(shuffle){
        shuffleBtn.innerText = "🔀 Shuffle On";
    }else{
        shuffleBtn.innerText = "🔀 Shuffle Off";
    }
};
let repeat = false;
let repeatBtn = document.getElementById("repeatBtn");

repeatBtn.onclick = function(){
    repeat = !repeat;

    if(repeat){
        repeatBtn.innerText = "🔁 Repeat On";
    }else{
        repeatBtn.innerText = "🔁 Repeat Off";
    }
};

// create list
function renderSongs(list){
    playlist.innerHTML = "";
    list.forEach((song,index)=>{
        let div = document.createElement("div");
        div.innerText = song.name;
        div.style.cursor="pointer";
        div.style.margin="8px";
        div.onclick = ()=> playSong(index);
        playlist.appendChild(div);
    });
}

// search filter
function filterSongs(){
    let text = document.getElementById("search").value.toLowerCase();
    let filtered = songs.filter(s => s.name.toLowerCase().includes(text));
    renderSongs(filtered);
}

// first load
renderSongs(songs);

function updateTime(){
    let cur = format(player.currentTime);
    let dur = format(player.duration);
    time.innerText = cur + " / " + dur;
}

function format(sec){
    if(!sec) return "0:00";
    let m = Math.floor(sec/60);
    let s = Math.floor(sec%60);
    if(s<10) s="0"+s;
    return m+":"+s;
}
let favList = document.getElementById("favList");
let likeBtn = document.getElementById("likeBtn");

let favourites = JSON.parse(localStorage.getItem("favs")) || [];

// play song modify (IMPORTANT — existing function replace)
function playSong(i){
    current = i;
    player.src = songs[i].file;
    player.load();
    player.play();

    title.innerText = songs[i].name;
    cover.src = songs[i].cover;

    updateLikeBtn();
    loadLyrics(songs[i].file.replace(".mp3",".txt"));

}

// like toggle
function toggleLike(){
    let songName = songs[current].name;

    if(favourites.includes(songName)){
        favourites = favourites.filter(s => s !== songName);
    }else{
        favourites.push(songName);
    }

    localStorage.setItem("favs", JSON.stringify(favourites));
    updateLikeBtn();
    renderFavs();
}

// change button icon
function updateLikeBtn(){
    if(favourites.includes(songs[current].name))
        likeBtn.innerText = "💚 Liked";
    else
        likeBtn.innerText = "🤍 Like";
}

// show favourites list
function renderFavs(){
    favList.innerHTML = "";
    favourites.forEach(name=>{
        let div = document.createElement("div");
        div.innerText = name;
        div.style.cursor="pointer";
        div.onclick = ()=>{
            let index = songs.findIndex(s=>s.name===name);
            if(index>=0) playSong(index);
        };
        favList.appendChild(div);
    });
}

// first load
renderFavs();
let volume = document.getElementById("volume");

volume.oninput = function(){
    player.volume = volume.value;
}
document.addEventListener("keydown", function(e){

    if(e.code === "Space"){
        e.preventDefault();
        if(player.paused) player.play();
        else player.pause();
    }

    if(e.code === "ArrowRight") nextSong();
    if(e.code === "ArrowLeft") prevSong();

});
let saved = localStorage.getItem("lastSong");
if(saved !== null){
    playSong(parseInt(saved));
}
function loadLyrics(file){
    alert(file);


  let box = document.getElementById("lyrics");
  box.innerText = "Loading lyrics...";

  let url = window.location.origin + "/my-music-app/" + file;

  fetch(url)
  .then(res => res.text())
  .then(text=>{
      box.innerText = text;
  })
  .catch(()=>{
      box.innerText = "Lyrics not available";
  });
}
</script>
</body>
</html>
