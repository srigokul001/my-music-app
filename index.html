<!DOCTYPE html>
<html>
<head>
<title>My Spotify</title>

<style>

/* layout */
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}
#loginBox{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
.app{
  display:flex;
  height:100vh;
}

/* sidebar */
.sidebar{
  width:220px;
  background:#000;
  padding:20px;
}

.sidebar li{
  margin:10px 0;
  list-style:none;
}

/* main */
.main{
  flex:1;
  padding:20px;
}

.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:20px;
}

.album{
  position:relative;
  background:#181818;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.album img{
  width:100%;
  border-radius:10px;
}

/* hover play */
.play-btn{
  position:absolute;
  bottom:60px;
  right:20px;
  background:#1db954;
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  opacity:0;
  transition:0.3s;
}

.album:hover .play-btn{
  opacity:1;
}

/* player */
.player-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#181818;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.player-left{
  display:flex;
  align-items:center;
}

.player-left img{
  width:60px;
  margin-right:10px;
}

/* controls */
.player-center{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.controls button{
  margin:5px;
}

/* progress */
.progress{
  width:300px;
}

/* rotate */
@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.rotate{
  animation:spin 6s linear infinite;
}

</style>
</head>

<body>
<div id="loginBox" style="text-align:center; margin-top:100px;">
  <h2>Login</h2>
  <input id="username" placeholder="Username"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>
  <div class="app" id="app" style="display:none;">

  </div>

<!-- sidebar -->
<div class="sidebar">
  h3>📂 Playlists</h3>

<input type="text" id="newPlaylist" placeholder="New playlist name">

<button onclick="createPlaylist()">Create</button>
<button onclick="addToPlaylist()">➕ Add to Playlist</button>
<div id="playlistContainer"></div>
<h2>MySpotify</h2>
<li>Home</li>
<li>Search</li>
<li>Library</li>
</div>

<!-- main -->
<div class="main">

<h2>Albums</h2>

<div class="album-grid">

<div class="album">
<img src="cover1.jpg">
<button class="play-btn" onclick="playSong(0)">▶</button>
<p>Song 1</p>
</div>

<div class="album">
<img src="cover2.jpg">
<button class="play-btn" onclick="playSong(1)">▶</button>
<p>Song 2</p>
</div>

<div class="album">
<img src="cover3.jpg">
<button class="play-btn" onclick="playSong(2)">▶</button>
<p>Song 3</p>
</div>

<div class="album">
<img src="cover4.jpg">
<button class="play-btn" onclick="playSong(3)">▶</button>
<p>Song 4</p>
</div>

<div class="album">
<img src="cover5.jpg">
<button class="play-btn" onclick="playSong(4)">▶</button>
<p>Song 5</p>
</div>

<div class="album">
<img src="cover6.jpg">
<button class="play-btn" onclick="playSong(5)">▶</button>
<p>Song 6</p>
</div>

</div>

</div>

</div>

<!-- player -->
<div class="player-bar">

<div class="player-left">
<img id="cover" src="cover1.jpg">
<div id="title">Select a song</div>
</div>

<div class="player-center">

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()" id="playBtn">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<input type="range" id="progress" class="progress">

</div>

<div>
<input type="range" id="volume" min="0" max="1" step="0.01">
</div>

<audio id="player"></audio>

</div>

<script>

let player = document.getElementById("player");
let title = document.getElementById("title");
let cover = document.getElementById("cover");
let progress = document.getElementById("progress");
let volume = document.getElementById("volume");

let songs = [
{name:"Song 1", file:"song1.mp3", cover:"cover1.jpg"},
{name:"Song 2", file:"song2.mp3", cover:"cover2.jpg"},
{name:"Song 3", file:"song3.mp3", cover:"cover3.jpg"},
{name:"Song 4", file:"song4.mp3", cover:"cover4.jpg"},
{name:"Song 5", file:"song5.mp3", cover:"cover5.jpg"},
{name:"Song 6", file:"song6.mp3", cover:"cover6.jpg"}
];

let current = 0;

/* play */
function playSong(i){
current=i;
player.src=songs[i].file;
player.play();

title.innerText=songs[i].name;
cover.src=songs[i].cover;
window.currentSongName = songs[i].name;
}

/* controls */
function togglePlay(){
if(player.paused){
player.play();
}else{
player.pause();
}
}

function nextSong(){
current++;
if(current>=songs.length) current=0;
playSong(current);
}

function prevSong(){
current--;
if(current<0) current=songs.length-1;
playSong(current);
}

/* progress */
player.ontimeupdate=function(){
progress.value=(player.currentTime/player.duration)*100;
}

progress.oninput=function(){
player.currentTime=(progress.value/100)*player.duration;
}

/* volume */
volume.oninput=function(){
player.volume=volume.value;
}

/* rotate */
player.onplay=()=>cover.classList.add("rotate");
player.onpause=()=>cover.classList.remove("rotate");


let playlists = JSON.parse(localStorage.getItem("playlists")) || {};

function createPlaylist(){
  let name = document.getElementById("newPlaylist").value;

  if(!name) return alert("Enter name");

  playlists[name] = [];
  localStorage.setItem("playlists", JSON.stringify(playlists));

  renderPlaylists();
}

function renderPlaylists(){
  let box = document.getElementById("playlistContainer");
  box.innerHTML = "";

  for(let p in playlists){
    let div = document.createElement("div");
    div.innerText = p;
    div.style.cursor="pointer";
    div.onclick = ()=> showPlaylist(p);
    box.appendChild(div);
  }
}

function showPlaylist(name){
  let list = playlists[name];
  alert(name + " contains " + list.length + " songs");
}

renderPlaylists();

function addToPlaylist(){

  let name = prompt("Enter playlist name");

  if(!playlists[name]) return alert("Playlist not found");

  playlists[name].push(currentSongName);

  localStorage.setItem("playlists", JSON.stringify(playlists));

  alert("Added!");
}
function login(){

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "" || pass === ""){
    alert("Enter details");
    return;
  }

  // save user
  localStorage.setItem("user", user);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="flex";
}
let savedUser = localStorage.getItem("user");

if(savedUser){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="flex";
}

</script>

</body>
</html>
